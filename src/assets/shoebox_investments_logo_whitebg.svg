<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Shoebox Investments Inc logo</title>
  <desc>Deep forest green and champagne gold wordmark with geometric investment grid mark</desc>

  <defs>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B472"/>
      <stop offset="100%" stop-color="#B8943E"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3929"/>
      <stop offset="100%" stop-color="#0E2116"/>
    </linearGradient>
  </defs>

  <g transform="translate(160, 78)">

    <!-- Outer border square — deep forest green stroke -->
    <rect x="0" y="0" width="44" height="44" rx="2"
      fill="none"
      stroke="#1A3929"
      stroke-width="2"/>

    <!-- Top-left inner square — deep forest green -->
    <rect x="9" y="9" width="11" height="11" rx="1"
      fill="url(#greenFill)"/>

    <!-- Top-right inner square — champagne gold -->
    <rect x="24" y="9" width="11" height="11" rx="1"
      fill="url(#goldFill)"/>

    <!-- Bottom-left inner square — champagne gold -->
    <rect x="9" y="24" width="11" height="11" rx="1"
      fill="url(#goldFill)"/>

    <!-- Bottom-right inner square — deep green, faded (30%) -->
    <rect x="24" y="24" width="11" height="11" rx="1"
      fill="#1A3929"
      opacity="0.3"/>

    <!-- Gold vertical divider line -->
    <line x1="62" y1="5" x2="62" y2="39"
      stroke="#C4A25A"
      stroke-width="0.8"/>

    <!-- SHOEBOX wordmark — deep forest green, Georgia serif -->
    <text x="78" y="34"
      fill="#1A3929"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="36"
      font-weight="400">SHOEBOX</text>

    <!-- INVESTMENTS INC tagline — champagne gold, sans-serif -->
    <text x="79" y="56"
      fill="#C4A25A"
      font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="11"
      font-weight="400"
      letter-spacing="2">INVESTMENTS INC</text>

  </g>
</svg>
